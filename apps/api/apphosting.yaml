      - RUNTIME
  - variable: FIREBASE_STORAGE_BUCKET
    value: kalitedb-5a7eb.firebasestorage.app
    availability:
      - RUNTIME
  - variable: ELEVENLABS_AGENT_ID
    value: agent_5101kpzzhbcxf2dbhwpwaa2wa6v4
    availability:
      - RUNTIME
  - variable: ELEVENLABS_ALLOWED_EMAILS
    value: zafer.coban@ikas.com
    availability:
      - RUNTIME
  - variable: ELEVENLABS_API_KEY
    secret: ELEVENLABS_API_KEY
