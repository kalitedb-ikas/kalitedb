name: Deploy GitHub Pages

on:
  push:
    branches:
      - zafercobannn
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_PUBLIC_BASE_PATH: /kalitedb/
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
      VITE_DEV_AUTH_MODE: "false"
      VITE_FIREBASE_API_KEY: "AIzaSyCACBgSJML9GQ8xDcLrHQWMav7254FWM0k"
      VITE_FIREBASE_AUTH_DOMAIN: "kalitedb-5a7eb.firebaseapp.com"
      VITE_FIREBASE_PROJECT_ID: "kalitedb-5a7eb"
      VITE_FIREBASE_STORAGE_BUCKET: "kalitedb-5a7eb.firebasestorage.app"
      VITE_FIREBASE_MESSAGING_SENDER_ID: "838169214324"
      VITE_FIREBASE_APP_ID: "1:838169214324:web:0fce6826dfddceb6ed8021"
      VITE_FIREBASE_MEASUREMENT_ID: "G-LQ8LQMJZBJ"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @kalitedb/web build

      - name: Create SPA fallback
        run: cp apps/web/dist/index.html apps/web/dist/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
